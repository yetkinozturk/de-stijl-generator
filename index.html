<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Stijl Generator</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-bar-left"></div>
  <div class="header-inner">
    <h1>De Stijl</h1>
    <span class="subtitle">Neo-plastic composition generator</span>
  </div>
  <div class="header-bar-right"></div>
</header>

<main>
  <!-- ── Controls ── -->
  <aside id="controls">

    <details class="section" open>
      <summary class="section-title">Background</summary>
      <div class="section-body">
        <div class="bg-swatches" id="bg-swatches"></div>
      </div>
    </details>

    <details class="section">
      <summary class="section-title">Line Color</summary>
      <div class="section-body">
        <div class="bg-swatches" id="line-swatches"></div>
      </div>
    </details>

    <details class="section" open>
      <summary class="section-title">Color Palette</summary>
      <div class="section-body">
        <div id="palette-list"></div>
        <button id="btn-add-color" class="btn-add">+ Add Color</button>
      </div>
    </details>

    <details class="section">
      <summary class="section-title">Presets</summary>
      <div class="section-body" id="presets"></div>
    </details>

    <details class="section" open>
      <summary class="section-title">Composition</summary>
      <div class="section-body">
        <div class="slider-row">
          <div class="slider-label">
            <span>Spacing</span><span id="val-spacing">0</span>
          </div>
          <input type="range" id="slider-spacing" min="0" max="40" step="1" value="0">
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span>Divisions</span><span id="val-divisions">6</span>
          </div>
          <input type="range" id="slider-divisions" min="3" max="14" step="1" value="6">
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span>Line Weight</span><span id="val-lineweight">4</span>
          </div>
          <input type="range" id="slider-lineweight" min="0" max="20" step="1" value="4">
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span>Density</span><span id="val-density">60</span>
          </div>
          <input type="range" id="slider-density" min="10" max="95" step="1" value="60">
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span>Center Pull</span><span id="val-center-pull">0</span>
          </div>
          <input type="range" id="slider-center-pull" min="0" max="100" step="1" value="0">
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span>Tilt</span><span id="val-tilt">0</span>°
          </div>
          <input type="range" id="slider-tilt" min="0" max="180" step="1" value="0">
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span>Aperture</span><span id="val-aperture">0</span>
          </div>
          <input type="range" id="slider-aperture" min="0" max="100" step="1" value="0">
        </div>
      </div>
    </details>

    <details class="section" open>
      <summary class="section-title">Generate</summary>
      <div class="section-body">
        <div class="btn-row" style="margin-bottom:10px">
          <button class="btn" id="btn-locations">↺ Locations</button>
          <button class="btn" id="btn-proportions">◧ Proportions</button>
        </div>
        <div class="btn-row">
          <button class="btn primary" id="btn-generate">Generate</button>
          <select id="select-resolution" class="btn">
            <option value="1">700 px</option>
            <option value="2" selected>1400 px</option>
            <option value="4">2800 px</option>
          </select>
          <button class="btn blue" id="btn-save">↓ Save</button>
        </div>
      </div>
    </details>

  </aside>

  <!-- ── Canvas ── -->
  <div id="canvas-wrap">
    <canvas id="canvas" width="700" height="700"></canvas>
  </div>
</main>

<footer>
  <div id="anim-controls">
    <button id="btn-playpause" class="btn-play" title="Play / Pause animation">▶</button>
    <div class="anim-speed-row">
      <span class="anim-speed-label">Sec/frame</span>
      <input type="range" id="slider-anim-speed" min="1" max="30" step="1" value="10">
      <span id="val-anim-speed">10</span>s
    </div>
  </div>
  <div class="footer-accent">
    <div class="fa fa-r"></div>
    <div class="fa fa-b"></div>
    <div class="fa fa-y"></div>
  </div>
</footer>

<script src="js/main.js"></script>
</body>
</html>
